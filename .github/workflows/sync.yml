name: Upstream Sync

# ✅ 关键权限设置：允许修改 .github/workflows/ 下的文件
permissions:
  contents: write

on:
  schedule:
    # 定时任务：每天 UTC 0 点执行（即北京时间 8 点）
    - cron: "0 0 * * *"
  # 支持手动触发（方便测试）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 仅当该仓库是 fork 仓库时才运行（避免误用）
    if: ${{ github.event.repository.fork }}
    
    steps:
      # 1. 检出你的 fork 仓库代码
      - name: Checkout target repo
        uses: actions/checkout@v4

      # 2. 使用社区 action 进行同步（自动 fetch + merge + push）
      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          # 这里使用 GitHub 自动生成的 token（已授予 workflows 权限）
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          
          # ⚠️ 修改为你的上游仓库（原作者的用户名/仓库名）
          upstream_sync_repo: qist/tvbox
          
          # ⚠️ 修改为上游仓库的默认分支（常见为 main 或 master）
          upstream_sync_branch: master
          
          # 你的 fork 分支（一般也是 master 或 main）
          target_sync_branch: master
          
          # 是否开启测试模式（false 表示真实执行）
          test_mode: false
